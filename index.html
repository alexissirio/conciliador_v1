// ── PARSERS ───────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { headers: [], rows: [] };
  const sep = lines[0].includes(";") ? ";" : lines[0].includes("\t") ? "\t" : lines[0].includes("|") ? "|" : ",";
  const splitLine = l => {
    const out = []; let cur = ""; let inQ = false;
    for (let i = 0; i < l.length; i++) {
      const ch = l[i];
      if (ch === '"') { inQ = !inQ; continue; }
      if (!inQ && ch === sep) { out.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    out.push(cur.trim());
    return out;
  };
  const headers = splitLine(lines[0]);
  const rows = lines.slice(1).filter(l => l.trim()).map(l => {
    const vals = splitLine(l);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] ?? ""; });
    return obj;
  });
  return { headers, rows };
}

function loadScript(src) {
  return new Promise((res, rej) => {
    if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
    const s = document.createElement("script"); s.src = src;
    s.onload = res; s.onerror = () => rej(new Error("Script load failed: " + src));
    document.head.appendChild(s);
  });
}

async function parseXLSX(file) {
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js");
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => {
      try {
        const wb = window.XLSX.read(e.target.result, { type: "binary" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = window.XLSX.utils.sheet_to_json(ws, { defval: "" });
        const headers = json.length > 0 ? Object.keys(json[0]) : [];
        res({ headers, rows: json });
      } catch (err) { rej(err); }
    };
    r.readAsBinaryString(file);
  });
}

// pdf.js text extraction
async function extractPDFText(file) {
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const ab = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: ab }).promise;
  let fullText = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const tc = await page.getTextContent();
    // Sort items by y (top→bottom), then x (left→right) to preserve table structure
    const items = tc.items.map(it => ({ x: Math.round(it.transform[4]), y: Math.round(it.transform[5]), str: it.str }));
    items.sort((a, b) => b.y - a.y || a.x - b.x);
    // Group by y-band (same row = within 5px)
    const rows = [];
    let curRow = null, curY = null;
    for (const it of items) {
      if (curY === null || Math.abs(it.y - curY) > 5) { curRow = []; rows.push(curRow); curY = it.y; }
      curRow.push(it.str);
    }
    fullText += rows.map(r => r.join("\t")).join("\n") + "\n";
  }
  return fullText;
}

// Heuristic: detect if extracted text looks like a structured table
function detectTableQuality(text) {
  const lines = text.trim().split("\n").filter(l => l.trim());
  if (lines.length < 3) return 0;
  // Count lines that have at least 2 tab-separated non-empty tokens
  const structured = lines.filter(l => l.split("\t").filter(t => t.trim()).length >= 2).length;
  // Count lines with date-like patterns
  const hasDates = lines.filter(l => /\d{2}[\/\-]\d{2}[\/\-]\d{2,4}/.test(l)).length;
  // Count lines with amount-like patterns
  const hasAmounts = lines.filter(l => /[\d.,]{4,}/.test(l)).length;
  const score = (structured / lines.length) * 40 + (hasDates / lines.length) * 30 + (hasAmounts / lines.length) * 30;
  return Math.round(score);
}

function heuristicParseTable(text) {
  const lines = text.trim().split("\n").filter(l => l.trim());
  if (lines.length < 2) return null;

  // Find header row: first line with multiple non-empty tokens
  let headerIdx = 0;
  for (let i = 0; i < Math.min(10, lines.length); i++) {
    const tokens = lines[i].split("\t").filter(t => t.trim());
    if (tokens.length >= 2) { headerIdx = i; break; }
  }

  const headers = lines[headerIdx].split("\t").map((h, i) => h.trim() || `Col_${i + 1}`).filter((_, i, a) => i < a.length);
  const rows = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const tokens = lines[i].split("\t");
    if (tokens.filter(t => t.trim()).length < 2) continue;
    const obj = {};
    headers.forEach((h, j) => { obj[h] = (tokens[j] ?? "").trim(); });
    rows.push(obj);
  }
  return rows.length > 0 ? { headers, rows } : null;
}

// AI fallback: send PDF text to Claude to parse into JSON table
async function aiParsePDF(rawText, filename) {
  const prompt = `Sos un experto en contabilidad argentina. El siguiente es texto extraído de un PDF (extracto bancario, reporte contable u otro documento financiero).

Tu tarea: devolvé ÚNICAMENTE un JSON válido con esta estructura:
{
  "headers": ["col1", "col2", ...],
  "rows": [{"col1": "val", ...}, ...]
}

Reglas:
- Identificá la tabla de movimientos/transacciones principal
- Normalizá los nombres de columna: Fecha, Descripcion, Referencia, Debito, Credito, Importe, Saldo (usá estos nombres cuando aplique)
- Omití filas de totales, encabezados repetidos, y filas vacías
- Mantené los importes como aparecen en el texto (sin reformatear)
- Si no encontrás una tabla clara, devolvé {"headers":[],"rows":[]}
- NO incluyas explicaciones, markdown, ni texto fuera del JSON

Nombre del archivo: ${filename}

Texto extraído:
${rawText.slice(0, 12000)}`;

  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 4000,
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!resp.ok) throw new Error("API error: " + resp.status);
  const data = await resp.json();
  const txt = data.content.find(b => b.type === "text")?.text ?? "";
  // Strip possible markdown fences
  const clean = txt.replace(/```json|```/gi, "").trim();
  return JSON.parse(clean);
}

// Main parse entry point
async function parseFile(file, onStatus) {
  const name = file.name.toLowerCase();
  if (name.endsWith(".csv") || name.endsWith(".txt")) {
    const text = await file.text();
    return { ...parseCSV(text), source: "csv" };
  }
  if (name.endsWith(".xlsx") || name.endsWith(".xls")) {
    return { ...(await parseXLSX(file)), source: "xlsx" };
  }
  if (name.endsWith(".pdf")) {
    onStatus("Extrayendo texto del PDF...");
    const rawText = await extractPDFText(file);
    const score = detectTableQuality(rawText);
    onStatus(`Calidad de detección: ${score}/100`);
    if (score >= 45) {
      const parsed = heuristicParseTable(rawText);
      if (parsed) return { ...parsed, source: "pdf-local", rawText, score };
    }
    // Low confidence → signal caller to ask user
    return { headers: [], rows: [], source: "pdf-needs-ai", rawText, score };
  }
  throw new Error("Formato no soportado. Usá CSV, XLSX o PDF.");
}

// ── MATCHING ENGINE ───────────────────────────────────────────────────────────
function normalize(v) { return String(v ?? "").trim().toLowerCase().replace(/\s+/g, " "); }
function numVal(v) { const n = parseFloat(String(v).replace(/[^0-9.,-]/g, "").replace(",", ".")); return isNaN(n) ? null : Math.abs(n); }

function buildKey(row, pairs, side, tol) {
  return pairs.map(p => {
    const col = side === "a" ? p.a : p.b;
    const raw = row[col] ?? "";
    if (p.type === "amount") {
      const n = numVal(raw);
      if (n === null) return normalize(raw);
      const t = tol === "0.01" ? 0.01 : tol === "1" ? 1 : tol === "10" ? 10 : 0;
      return t === 0 ? String(Math.round(n * 100)) : String(Math.round(n / t));
    }
    return normalize(raw);
  }).join("|||");
}

function conciliar(rowsA, rowsB, pairs, tol) {
  const mapB = new Map();
  rowsB.forEach((row, idx) => {
    const k = buildKey(row, pairs, "b", tol);
    if (!mapB.has(k)) mapB.set(k, []);
    mapB.get(k).push({ row, idx, used: false });
  });
  const matches = [], onlyA = [];
  rowsA.forEach(rowA => {
    const k = buildKey(rowA, pairs, "a", tol);
    const c = (mapB.get(k) ?? []).find(x => !x.used);
    if (c) { c.used = true; matches.push({ rowA, rowB: c.row }); }
    else onlyA.push(rowA);
  });
  const onlyB = [];
  mapB.forEach(arr => arr.forEach(x => { if (!x.used) onlyB.push(x.row); }));
  return { matches, onlyA, onlyB };
}

// ── CSV EXPORT ────────────────────────────────────────────────────────────────
function exportCSV(rows, fname) {
  if (!rows.length) return;
  const hs = Object.keys(rows[0]);
  const csv = ["sep=;", hs.join(";"), ...rows.map(r => hs.map(h => `"${String(r[h] ?? "").replace(/"/g, '""')}"`).join(";"))].join("\n");
  const bom = "\uFEFF";
  const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = fname; a.style.display = "none";
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}

function UploadZone({ label, file, drag, onFile, onClear, onDrag, status }) {
  const inputRef = useRef();
  const handleDrop = e => { e.preventDefault(); onDrag(false); if (e.dataTransfer.files[0]) onFile(e.dataTransfer.files[0]); };

function DataTable({ rows, keyCols, rowClass, emptyMsg, exportName }) {
  const [q, setQ] = useState("");
  const headers = useMemo(() => rows.length > 0 ? Object.keys(rows[0]).slice(0, 12) : [], [rows]);
  const filtered = useMemo(() => {
    if (!q) return rows;
    const lo = q.toLowerCase();
    return rows.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(lo)));
  }, [rows, q]);

  if (!rows.length) return (
    <div className="tbl-wrap"><div className="empty"><div className="ei">🎉</div><p>{emptyMsg}</p></div></div>
  );
  return (
    <div className="tbl-wrap">
      <div className="tbl-bar">

    </div>

}

function MatchTable({ matches, pairs, exportName }) {
  const [q, setQ] = useState("");
  const rows = useMemo(() => matches.map(m => {
    const o = {};
    pairs.forEach(p => { o[`🔑 ${p.a}`] = m.rowA[p.a]; });
    Object.keys(m.rowA).filter(h => !pairs.find(p => p.a === h)).slice(0, 4).forEach(h => { o[`A:${h}`] = m.rowA[h]; });
    Object.keys(m.rowB).filter(h => !pairs.find(p => p.b === h)).slice(0, 4).forEach(h => { o[`B:${h}`] = m.rowB[h]; });
    return o;
  }), [matches, pairs]);

  const headers = useMemo(() => rows.length > 0 ? Object.keys(rows[0]) : [], [rows]);
  const filtered = useMemo(() => {
    if (!q) return rows;
    const lo = q.toLowerCase();
    return rows.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(lo)));
  }, [rows, q]);

  if (!matches.length) return (
    <div className="tbl-wrap"><div className="empty"><div className="ei">⚠️</div><p>No hubo coincidencias. Revisá las columnas clave.</p></div></div>
  );
  return (
    <div className="tbl-wrap">
      <div className="tbl-bar">
        <input className="srch" placeholder="Buscar en coincidencias..." value={q} onChange={e => setQ(e.target.value)} />
        <button className="btn-exp" onClick={() => exportCSV(filtered, exportName)}>↓ Exportar</button>
      </div>
      <div className="tbl-scroll">
        <table>
          <thead><tr>{headers.map(h => <th key={h}>{h}</th>)}</tr></thead>
          <tbody>
            {filtered.slice(0, 500).map((row, i) => (
              <tr key={i} className="mr">
                {headers.map(h => <td key={h} className={h.startsWith("🔑") ? "kc" : ""}>{String(row[h] ?? "")}</td>)}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

                ["periodo","Período","Abril 2025"],
                ["banco","Banco / Entidad",""],
                ["cuenta","Cuenta N°",""],
                ["saldoContable","Saldo contable (Libro Mayor)",""],
                ["saldoExtracto","Saldo según extracto bancario",""],
                ["fechaExtracto","Fecha extracto","30/04/2025"],
                ["preparado","Preparado por",""],
              ].map(([key,label,ph])=>(
                <div key={key}>
                  <span style={lbl}>{label}</span>
                  <input style={inp} placeholder={ph} value={reporteCfg[key]}
                    onChange={e=>setReporteCfg(p=>({...p,[key]:e.target.value}))} />
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:10,marginTop:4}}>
              <button onClick={()=>setShowModal(false)}
                style={{flex:1,padding:"11px",background:"transparent",border:`1px solid ${C.borderHi}`,borderRadius:8,color:C.dim,fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                Cancelar
              </button>
              <button onClick={generarReporte}
                style={{flex:2,padding:"11px",background:C.green,border:"none",borderRadius:8,color:"#fff",fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                ↓ Generar Excel
              </button>
            </div>
          </div>
        </div>
      )}
      <div className="app">
        {/* Header */}
        <div style={{ marginBottom: 36 }}>
          <div className="hdr-tag">Total Home S.A. · GAF</div>
          <h1>Conciliador</h1>
          <div className="hdr-sub">CSV · XLSX · PDF — todo procesado en el browser. Sin subir datos a ningún servidor.</div>
        </div>

        {/* Steps */}
        <div className="steps">
          {["Cargar A", "Cargar B", "Configurar", "Resultado"].map((lbl, i) => (
            <div key={lbl} className={`step ${step > i+1 ? "done" : step === i+1 ? "active" : ""}`}>
              <div className="step-dot">{step > i+1 ? "✓" : i+1}</div>
              <div className="step-lbl">{lbl}</div>
            </div>
          ))}
        </div>

        {/* Upload */}
        <div className="up-grid">
          <UploadZone label="Reporte A (el tuyo)" file={fileA} drag={dragA} status={statusA ?? (aiLoading === "a" ? "✨ Parseando con IA..." : null)}
            onFile={f => handleFile(f, "a")} onClear={() => { setFileA(null); setResult(null); setPdfWarn(null); }} onDrag={setDragA} />
          <UploadZone label="Reporte B (banco / otro sistema)" file={fileB} drag={dragB} status={statusB ?? (aiLoading === "b" ? "✨ Parseando con IA..." : null)}
            onFile={f => handleFile(f, "b")} onClear={() => { setFileB(null); setResult(null); setPdfWarn(null); }} onDrag={setDragB} />
        </div>

        {/* PDF warning → AI fallback */}
        {pdfWarn && (
          <div className="pdf-warn">
            ⚠ PDF detectado con baja confianza (score {pdfWarn.score}/100) — el layout puede no ser tabular.
            <button onClick={runAIParse}>✨ Parsear con IA</button>
            <span style={{ marginLeft: 6, fontSize: 11 }}>o descartá el archivo y exportá como CSV desde el banco.</span>
          </div>
        )}

        {err && <div className="err">⚠ {err}</div>}

        {/* Config */}
        {fileA && fileB && (
          <div className="cfg">
            <div className="cfg-ttl">Columnas clave para el matching</div>
            {pairs.map((p, i) => (
              <div key={i} className="kp-row">
                <select className="col-sel" value={p.a} onChange={e => updPair(i, "a", e.target.value)}>
                  <option value="">— columna en A —</option>
                  {headersA.map(h => <option key={h} value={h}>{h}</option>)}
                </select>
                <span className="arrow">⟷</span>
                <select className="col-sel" value={p.b} onChange={e => updPair(i, "b", e.target.value)}>
                  <option value="">— columna en B —</option>
                  {headersB.map(h => <option key={h} value={h}>{h}</option>)}
                </select>
                <select className="col-sel" style={{ maxWidth: 105 }} value={p.type} onChange={e => updPair(i, "type", e.target.value)}>
                  <option value="text">Texto</option>
                  <option value="amount">Importe</option>
                </select>
                {pairs.length > 1 && <button className="btn-rm-kp" onClick={() => { setPairs(prev => prev.filter((_, j) => j !== i)); setResult(null); }}>×</button>}
              </div>
            ))}
            <button className="btn-add-kp" onClick={() => setPairs(prev => [...prev, { a: "", b: "", type: "text" }])}>+ agregar columna clave</button>
            <div className="tol-row">
              <span className="tol-lbl">Tolerancia en importes:</span>
              {[["exact","Exacto"],["0.01","± $0.01"],["1","± $1"],["10","± $10"]].map(([v,lbl]) => (
                <button key={v} className={`tol-btn${tol===v?" on":""}`} onClick={() => { setTol(v); setResult(null); }}>{lbl}</button>
              ))}
            </div>
          </div>
        )}

        {/* Run */}
        {fileA && fileB && (
          <button className={`btn-run${running ? " loading" : ""}`} onClick={run} disabled={!canRun || running}>
            {running ? "Procesando..." : "▶  Ejecutar conciliación"}
          </button>
        )}

        {/* Results */}
        {result && (
          <>
            <div className="summary">
              <div className="stat g"><div className="stat-n">{result.matches.length.toLocaleString()}</div><div className="stat-l">Coinciden</div></div>
              <div className="stat r"><div className="stat-n">{result.onlyA.length.toLocaleString()}</div><div className="stat-l">Solo en A</div></div>
              <div className="stat a"><div className="stat-n">{result.onlyB.length.toLocaleString()}</div><div className="stat-l">Solo en B</div></div>
            </div>

            <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:12 }}>
              <button className="btn-exp-all" onClick={exportAll}>📊 Generar Conciliación Bancaria (.xlsx)</button>
            </div>

            <div className="tabs">
              <button className={`tab${tab==="matches"?" on tg":""}`} onClick={()=>setTab("matches")}>
                ✅ Coinciden <span className="badge">{result.matches.length}</span>
              </button>
              <button className={`tab${tab==="onlyA"?" on tr":""}`} onClick={()=>setTab("onlyA")}>
                ← Solo en A <span className="badge">{result.onlyA.length}</span>
              </button>
              <button className={`tab${tab==="onlyB"?" on ta":""}`} onClick={()=>setTab("onlyB")}>
                → Solo en B <span className="badge">{result.onlyB.length}</span>
              </button>
            </div>

            {tab==="matches" && <MatchTable matches={result.matches} pairs={pairs} exportName="conciliacion_coincidencias.csv" />}
            {tab==="onlyA" && <DataTable rows={result.onlyA} keyCols={pairs.map(p=>p.a)} rowClass="ar" emptyMsg="Todo lo de A tiene match en B. ✓" exportName="solo_en_A.csv" />}
            {tab==="onlyB" && <DataTable rows={result.onlyB} keyCols={pairs.map(p=>p.b)} rowClass="br" emptyMsg="Todo lo de B tiene match en A. ✓" exportName="solo_en_B.csv" />}
          </>
        )}
      </div>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
